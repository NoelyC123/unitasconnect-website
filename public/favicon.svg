<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#1a1f2e"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#a8b4c4" stroke-width="1.2"/>
  <!-- Gold top node -->
  <circle cx="16" cy="7.5" r="3" fill="#c9923a"/>
  <!-- Bottom nodes -->
  <circle cx="9" cy="21" r="3" fill="#d0dae6"/>
  <circle cx="23" cy="21" r="3" fill="#d0dae6"/>
  <!-- Gold lines -->
  <line x1="16" y1="10.5" x2="11" y2="19" stroke="#c9923a" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="10.5" x2="21" y2="19" stroke="#c9923a" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Dashed base -->
  <line x1="12" y1="21" x2="20" y2="21" stroke="#5a6a7a" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2 1.5"/>
</svg>
